name: Docker Word Count

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/docker-wc.yml"
      - ".dockerignore"
      - "docker/jmr-wc/**"
      - "pom.xml"
      - "src/**"
  pull_request:
    paths:
      - ".github/workflows/docker-wc.yml"
      - ".dockerignore"
      - "docker/jmr-wc/**"
      - "pom.xml"
      - "src/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout client repository
        uses: actions/checkout@v4

      - name: Checkout jmr repository
        uses: actions/checkout@v4
        with:
          repository: leorm2002/jmr
          ref: main
          path: jmr-upstream

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: |
            pom.xml
            jmr-upstream/mapreduce-parent/pom.xml
            jmr-upstream/mapreduce-parent/jmr-common/pom.xml
            jmr-upstream/mapreduce-parent/jmr-client/pom.xml
            jmr-upstream/mapreduce-parent/jmr-grpcdataprovider/pom.xml

      - name: Install JMR client dependencies
        run: >
          mvn -B -q
          -f jmr-upstream/mapreduce-parent/pom.xml
          -pl jmr-client,jmr-grpcdataprovider
          -am
          install
          -DskipTests

      - name: Build word count artifact
        run: mvn -B -q clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: leo02n/jmr-wc
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: leo02n
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push wc image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/jmr-wc/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
