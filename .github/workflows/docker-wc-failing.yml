name: Docker Word Count Failing

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/docker-wc-failing.yml"
      - "docker/jmr-wc-failing/**"
      - "docker/jmr-runtime/submitter-log4j2.xml"
      - "my-mapreduce-job/**"
      - "mapreduce-parent/pom.xml"
      - "mapreduce-parent/jmr-client/**"
      - "mapreduce-parent/jmr-common/**"
      - "mapreduce-parent/jmr-grpcdataprovider/**"
  pull_request:
    paths:
      - ".github/workflows/docker-wc-failing.yml"
      - "docker/jmr-wc-failing/**"
      - "docker/jmr-runtime/submitter-log4j2.xml"
      - "my-mapreduce-job/**"
      - "mapreduce-parent/pom.xml"
      - "mapreduce-parent/jmr-client/**"
      - "mapreduce-parent/jmr-common/**"
      - "mapreduce-parent/jmr-grpcdataprovider/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install shared MapReduce modules
        working-directory: mapreduce-parent
        run: mvn -B -q install -DskipTests

      - name: Build failing word count artifact
        working-directory: my-mapreduce-job
        run: mvn -B -q package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: leo02n/jmr-wc-failing
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: leo02n
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push failing wc image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/jmr-wc-failing/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
